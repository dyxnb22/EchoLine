apiVersion: v1
kind: Secret
metadata:
  name: echoline-secrets
  namespace: default
type: Opaque
stringData:
  database-url: postgres://echoline:CHANGE_ME@postgres:5432/echoline?sslmode=disable
  jwt-secret: CHANGE_ME_USE_OPENSSL_RAND_BASE64_32
  redis-addr: redis:6379
  kafka-brokers: redpanda:9092
