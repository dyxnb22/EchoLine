replicaCount: 1

image:
  repository: ghcr.io/echoline/api
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  APP_ENV: production
  HTTP_ADDR: ":8080"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

worker:
  enabled: true
  replicaCount: 1
