components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
    RegisterRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
        password:
          type: string
        display_name:
          type: string
    LoginRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
        password:
          type: string
    RefreshRequest:
      type: object
      required:
      - refresh_token
      properties:
        refresh_token:
          type: string
    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
        created_at:
          type: string
          format: date-time
    PatchMeRequest:
      type: object
      properties:
        display_name:
          type: string
    DirectConversationRequest:
      type: object
      required:
      - user_id
      properties:
        user_id:
          type: string
          format: uuid
    GroupConversationRequest:
      type: object
      properties:
        title:
          type: string
        member_ids:
          type: array
          items:
            type: string
            format: uuid
    SendMessageRequest:
      type: object
      required:
      - client_msg_id
      - type
      - body
      properties:
        client_msg_id:
          type: string
        type:
          type: string
        body:
          type: string
        attachment:
          type: object
          properties:
            object_key:
              type: string
    EditMessageRequest:
      type: object
      required:
      - body
      properties:
        body:
          type: string
    MarkReadRequest:
      type: object
      required:
      - last_read_seq
      properties:
        last_read_seq:
          type: integer
          format: int64
    SyncRequest:
      type: object
      required:
      - device_id
      - cursors
      properties:
        device_id:
          type: string
        cursors:
          type: array
          items:
            type: object
            properties:
              conversation_id:
                type: string
              last_seq:
                type: integer
                format: int64
    SyncResponse:
      type: object
      properties:
        device_id:
          type: string
        conversations:
          type: array
          items:
            type: object
            properties:
              conversation_id:
                type: string
              messages:
                type: array
                items:
                  type: object
              latest_seq:
                type: integer
              unread:
                type: integer
    AckRequest:
      type: object
      required:
      - message_id
      - conversation_id
      - seq
      - status
      properties:
        message_id:
          type: string
        conversation_id:
          type: string
        seq:
          type: integer
        status:
          type: string
          enum:
          - delivered
          - read
        device_id:
          type: string
    UploadURLRequest:
      type: object
      properties:
        mime_type:
          type: string
        size_bytes:
          type: integer
        checksum:
          type: string
    UploadURLResponse:
      type: object
      properties:
        upload_url:
          type: string
        object_key:
          type: string
        bucket:
          type: string
        expires_in:
          type: integer
    DownloadURLRequest:
      type: object
      properties:
        object_key:
          type: string
    DownloadURLResponse:
      type: object
      properties:
        download_url:
          type: string
        expires_in:
          type: integer
    Message:
      type: object
      properties:
        id:
          type: string
        conversation_id:
          type: string
        seq:
          type: integer
        body:
          type: string
        type:
          type: string
        status:
          type: string
    MessageList:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        next_before:
          type: integer
    Conversation:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
    ConversationList:
      type: object
      properties:
        conversations:
          type: array
          items:
            $ref: '#/components/schemas/Conversation'
    ConversationMember:
      type: object
    DeviceList:
      type: object
      properties:
        devices:
          type: array
          items:
            type: object
    SearchResults:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
    InviteMemberRequest:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Rate limited
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
