services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: echoline
      POSTGRES_PASSWORD: echoline
      POSTGRES_DB: echoline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://echoline:echoline@postgres:5432/echoline?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: change-me-in-production
      KAFKA_BROKERS: redpanda:9092
      MIGRATIONS_DIR: /app/migrations
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: echoline
      PAYMENT_SELF_SERVE: "false"
    depends_on:
      - postgres
      - redis
      - redpanda
      - minio

  worker:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/worker"]
    environment:
      DATABASE_URL: postgres://echoline:echoline@postgres:5432/echoline?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: change-me-in-production
      KAFKA_BROKERS: redpanda:9092
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      - postgres
      - redis
      - redpanda

  gateway:
    profiles: ["gateway"]
    image: nginx:alpine
    ports:
      - "8088:8080"
    volumes:
      - ./deploy/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:

